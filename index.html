<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Tripura University — Interactive Campus Map</title>
<meta name="description" content="An open-source, interactive campus navigation platform for Tripura University: search buildings and rooms, filter by category, and find walking routes across campus.">
<meta name="theme-color" content="#10233A">

<link rel="icon" href="assets/icons/favicon.svg" type="image/svg+xml">

<!-- Leaflet (open-source mapping library) -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">

<!-- Typography: display serif + body sans + data mono -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/dark.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>
<a class="skip-link" href="#map-canvas">Skip to map</a>

<div id="app-shell">

  <!-- ============ Loading splash ============ -->
  <div id="app-loading" aria-live="polite">
    <div class="loading-crest">
      <svg viewBox="0 0 24 24" width="30" height="30" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m12 2 3.1 6.9 7.4.9-5.5 5.2 1.5 7.3L12 18.8l-6.5 3.5 1.5-7.3-5.5-5.2 7.4-.9Z"/></svg>
    </div>
    <div class="loading-ring"></div>
    <div class="loading-label" id="loading-label">Loading Tripura University campus map…</div>
  </div>

  <!-- ============ Map canvas ============ -->
  <main id="map-canvas" role="application" aria-label="Interactive campus map"></main>

  <!-- ============ Top bar: brand + search + theme ============ -->
  <header class="topbar">
    <div class="brand">
      <div class="brand__crest" aria-hidden="true">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8"><path d="m12 2 3.1 6.9 7.4.9-5.5 5.2 1.5 7.3L12 18.8l-6.5 3.5 1.5-7.3-5.5-5.2 7.4-.9Z"/></svg>
      </div>
      <div class="brand__text">
        <span class="brand__title">Tripura University</span>
        <span class="brand__subtitle">Campus Map</span>
      </div>
    </div>

    <div class="search-float">
      <div class="search-box">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="search-input" type="text" placeholder="Search buildings, rooms, departments…" aria-label="Search the campus" autocomplete="off">
        <button class="search-clear" id="search-clear" aria-label="Clear search">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
        </button>
        <span class="kbd-hint">/</span>
      </div>
      <div class="search-suggestions" id="search-suggestions" role="listbox"></div>
    </div>

    <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme"></button>
    <button class="icon-btn" id="sidebar-toggle" aria-label="Toggle filters">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M7 12h10M10 18h4"/></svg>
    </button>
    <button class="icon-btn" id="route-toggle" aria-label="Plan a route">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 20l-5-2V4l5 2 6-2 5 2v14l-5-2-6 2Z"/><path d="M9 6v14M15 4v14"/></svg>
    </button>
  </header>

  <!-- ============ Recenter pill ============ -->
  <button class="recenter-btn" id="recenter-btn">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
    Recenter on campus
  </button>

  <!-- ============ Sidebar: filters + legend ============ -->
  <aside class="sidebar" id="sidebar" aria-label="Map filters and legend">
    <div class="sidebar__header">
      <h2>Explore the Campus</h2>
      <button class="icon-btn" id="sidebar-close-shortcut" style="width:30px;height:30px" onclick="document.getElementById('sidebar').classList.remove('open')" aria-label="Close filters">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="sidebar__body">
      <div class="filter-section">
        <div class="filter-section__title">Filter by Category</div>
      </div>
      <div id="filter-chips"></div>
      <div class="filter-section">
        <div class="filter-section__title">Map Legend</div>
        <div class="legend-list" id="legend-list"></div>
      </div>
    </div>
  </aside>

  <!-- ============ Map controls: zoom, compass ============ -->
  <div class="map-controls">
    <div class="zoom-stack">
      <button id="zoom-in" aria-label="Zoom in"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg></button>
      <button id="zoom-out" aria-label="Zoom out"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/></svg></button>
    </div>
    <div class="compass-rose" id="compass" aria-label="Reset view to campus center" role="button" tabindex="0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="m12 2 3 8-3-1.5L9 10Z" fill="currentColor" stroke="none"/><circle cx="12" cy="12" r="9"/></svg>
    </div>
  </div>

  <!-- ============ Floating Action Button: Locate Me ============ -->
  <button class="fab" id="fab-locate" aria-label="Locate me">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
  </button>

  <!-- ============ Route planner panel ============ -->
  <section class="route-panel" id="route-panel" aria-label="Route planner">
    <div class="route-panel__row">
      <span class="route-dot route-dot--start"></span>
      <input class="route-input" id="route-start" placeholder="Starting point (or tap Locate Me)">
    </div>
    <div class="route-panel__row">
      <button class="route-swap" id="route-swap" aria-label="Swap start and destination">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 4v16M7 20l-3-3M7 20l3-3M17 20V4M17 4l-3 3M17 4l3 3"/></svg>
      </button>
      <span class="route-dot route-dot--end"></span>
      <input class="route-input" id="route-end" placeholder="Destination">
    </div>
    <div class="route-mode-toggle">
      <button class="active" data-mode="fastest">Fastest</button>
      <button data-mode="accessible">Accessible</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:12px;">
      <button class="btn btn-primary" id="route-find" style="flex:1;justify-content:center">Find Route</button>
      <button class="btn btn-ghost" id="route-close">Close</button>
    </div>
    <div class="route-summary" id="route-summary" style="display:none"></div>
  </section>

  <!-- ============ Information drawer ============ -->
  <section class="drawer" id="info-drawer" aria-label="Building details">
    <div class="drawer__hero">
      <div class="drawer__hero-overlay">
        <div class="drawer__eyebrow">BUILDING</div>
        <h3 class="drawer__title">Select a building</h3>
      </div>
      <button class="drawer__close" id="drawer-close" aria-label="Close details">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="drawer__body" id="drawer-body"></div>
  </section>

  <!-- ============ Map context menu ============ -->
  <div class="context-menu" id="context-menu" role="menu">
    <button data-action="directions-from" role="menuitem">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 11l18-8-8 18-2-8-8-2Z"/></svg>
      Directions from here
    </button>
    <button data-action="copy-coords" role="menuitem">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>
      Copy coordinates
    </button>
    <button data-action="share-location" role="menuitem">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><path d="M8.6 10.5 15.4 6.5M8.6 13.5l6.8 4"/></svg>
      Share this location
    </button>
  </div>

  <!-- ============ Toasts ============ -->
  <div class="toast-stack" id="toast-stack" aria-live="polite"></div>

</div>

<!-- Leaflet (open-source, no API key required) -->
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>

<!-- App modules, loaded in dependency order (no bundler by design) -->
<script src="js/helpers.js"></script>
<script src="js/dataLoader.js"></script>
<script src="js/map.js"></script>
<script src="js/routing.js"></script>
<script src="js/search.js"></script>
<script src="js/filters.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>
</body>
</html>
