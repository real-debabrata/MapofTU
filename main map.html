<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tripura University - Interactive Campus Map</title>
    <meta name="description" content="Explore Tripura University campus with our interactive GIS platform. Find departments, rooms, amenities, and dynamic accessible pathways.">
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#0C2340">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Leaflet GIS Assets -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    
    <!-- Typography & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Main Style Bundle -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="app-container" class="app-layout system-theme-auto">
        <!-- Sidebar Navigation Drawer -->
        <aside id="sidebar-drawer" class="sidebar collapsed">
            <header class="sidebar-header">
                <div class="brand-container">
                    <div class="brand-logo">
                        <svg class="crest-svg" viewBox="0 0 100 100" aria-hidden="true">
                            <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="4"/>
                            <polygon points="50,15 80,75 20,75" fill="none" stroke="currentColor" stroke-width="4"/>
                            <circle cx="50" cy="48" r="8" fill="currentColor"/>
                        </svg>
                    </div>
                    <div class="brand-text">
                        <h1>Tripura University</h1>
                        <span class="sub-brand">Campus GIS Directory</span>
                    </div>
                </div>
                <button id="close-sidebar-btn" class="icon-button mobile-only" aria-label="Close sidebar">✕</button>
            </header>

            <main class="sidebar-scroller">
                <!-- Navigation Tabs -->
                <nav class="sidebar-tabs" aria-label="Main Navigation">
                    <button class="tab-btn active" data-tab="search-panel">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        <span>Search</span>
                    </button>
                    <button class="tab-btn" data-tab="routing-panel">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 20l-5.447-2.724A1 1 0 013 16.382V5.618a1 1 0 011.447-.894L9 7m0 13l6-3m-6 3V7m6 10l4.553 2.276A1 1 0 0021 18.382V7.618a1 1 0 00-.553-.894L15 4m0 13V4m0 0L9 7"/></svg>
                        <span>Directions</span>
                    </button>
                    <button class="tab-btn" data-tab="filters-panel">
                        <svg width="18" height="18" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 13.586A1 1 0 013 12.879V4z"/></svg>
                        <span>Explore</span>
                    </button>
                </nav>

                <!-- Panel Content Container -->
                <div class="panel-deck">
                    <!-- Search Panel -->
                    <section id="search-panel" class="tab-panel active">
                        <div class="search-input-wrapper">
                            <input type="text" id="main-search-input" placeholder="Search departments, buildings, facilities..." autocomplete="off">
                            <button id="clear-search-btn" class="icon-button hidden" aria-label="Clear Search">✕</button>
                        </div>
                        <div id="search-suggestions" class="suggestions-container hidden"></div>
                        
                        <div id="search-history-container" class="meta-section">
                            <div class="meta-header">
                                <h3>Recent Searches</h3>
                                <button id="clear-history-btn" class="text-button">Clear</button>
                            </div>
                            <ul id="search-history-list" class="quick-link-list"></ul>
                        </div>

                        <div class="meta-section">
                            <h3>Quick Landmarks</h3>
                            <div class="quick-chips">
                                <button class="chip" data-query="Academic Building 11">Science Block</button>
                                <button class="chip" data-query="Central Library">Library</button>
                                <button class="chip" data-query="Administrative Block">Administration</button>
                                <button class="chip" data-query="Canteen">Food Court</button>
                                <button class="chip" data-query="Health Centre">Medical</button>
                            </div>
                        </div>
                    </section>

                    <!-- Routing Panel -->
                    <section id="routing-panel" class="tab-panel">
                        <div class="routing-form">
                            <div class="route-input-group">
                                <label for="route-from-input">Start</label>
                                <div class="input-row">
                                    <input type="text" id="route-from-input" placeholder="Choose starting point..." autocomplete="off">
                                    <button class="locate-me-btn mini-btn" title="Use current location">
                                        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                                    </button>
                                </div>
                                <div id="route-from-suggestions" class="suggestions-container hidden"></div>
                            </div>

                            <div class="routing-visual-divider">
                                <div class="line"></div>
                                <button id="swap-route-btn" class="icon-button" aria-label="Swap points">⇅</button>
                            </div>

                            <div class="route-input-group">
                                <label for="route-to-input">Destination</label>
                                <div class="input-row">
                                    <input type="text" id="route-to-input" placeholder="Choose destination..." autocomplete="off">
                                </div>
                                <div id="route-to-suggestions" class="suggestions-container hidden"></div>
                            </div>

                            <!-- Route Optimization Preferences -->
                            <div class="route-preferences">
                                <label class="preference-toggle">
                                    <input type="checkbox" id="accessible-route-toggle">
                                    <span class="custom-slider"></span>
                                    <span class="label-text">Wheelchair Accessible Routes Only</span>
                                </label>
                            </div>

                            <button id="find-route-btn" class="primary-btn">Calculate Route</button>
                        </div>

                        <!-- Routing Result State -->
                        <div id="route-result-card" class="result-card hidden">
                            <div class="result-summary">
                                <div class="metrics">
                                    <span id="route-eta" class="metric-highlight">-- min</span>
                                    <span id="route-distance" class="metric-sub">-- m</span>
                                </div>
                                <button id="clear-route-btn" class="icon-button" title="Clear path">✕</button>
                            </div>
                            <div class="route-type-badge">Walking Route</div>
                            <hr class="card-divider">
                            <div class="directions-scroller">
                                <ol id="route-directions-list" class="directions-list"></ol>
                            </div>
                        </div>
                    </section>

                    <!-- Filters Panel -->
                    <section id="filters-panel" class="tab-panel">
                        <div class="filter-group">
                            <h3>Campus Categories</h3>
                            <p class="filter-subtitle">Toggle layers to filter maps visually</p>
                            
                            <div class="filter-controls">
                                <label class="filter-card">
                                    <input type="checkbox" class="layer-filter" value="academic" checked>
                                    <span class="filter-visual bg-academic"></span>
                                    <span class="filter-label">Academic Buildings</span>
                                </label>
                                <label class="filter-card">
                                    <input type="checkbox" class="layer-filter" value="administration" checked>
                                    <span class="filter-visual bg-admin"></span>
                                    <span class="filter-label">Administration</span>
                                </label>
                                <label class="filter-card">
                                    <input type="checkbox" class="layer-filter" value="hostels" checked>
                                    <span class="filter-visual bg-hostels"></span>
                                    <span class="filter-label">Hostels</span>
                                </label>
                                <label class="filter-card">
                                    <input type="checkbox" class="layer-filter" value="amenities" checked>
                                    <span class="filter-visual bg-amenity"></span>
                                    <span class="filter-label">Campus Amenities</span>
                                </label>
                                <label class="filter-card">
                                    <input type="checkbox" class="layer-filter" value="sports" checked>
                                    <span class="filter-visual bg-sports"></span>
                                    <span class="filter-label">Sports Complex</span>
                                </label>
                                <label class="filter-card">
                                    <input type="checkbox" class="layer-filter" value="parking" checked>
                                    <span class="filter-visual bg-parking"></span>
                                    <span class="filter-label">Parking & Transit</span>
                                </label>
                                <label class="filter-card">
                                    <input type="checkbox" class="layer-filter" value="emergency">
                                    <span class="filter-visual bg-emergency"></span>
                                    <span class="filter-label">Emergency Stations</span>
                                </label>
                            </div>
                        </div>
                    </section>
                </div>
            </main>
        </aside>

        <!-- Main Map Screen Space -->
        <main id="map-workspace" class="map-container">
            <!-- Dynamic Floating Search Trigger (Mobile UI Indicator) -->
            <div class="floating-header-bar mobile-only">
                <button id="open-sidebar-btn" class="floating-trigger-card">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
                    <span>Search Tripura University Map...</span>
                </button>
            </div>

            <!-- The Leaflet Canvas Target -->
            <div id="leaflet-map-canvas"></div>

            <!-- Dynamic UI Layer Widgets (Overlaid controls on Canvas) -->
            <div class="map-controls-overlay-top-right">
                <!-- Theme Control -->
                <button id="theme-switch-btn" class="round-control-btn glass-panel" title="Toggle Theme" aria-label="Toggle Theme">
                    <svg class="sun-icon hidden" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"/></svg>
                    <svg class="moon-icon" width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"/></svg>
                </button>

                <!-- Location Access Core -->
                <button id="locate-user-btn" class="round-control-btn glass-panel" title="Center Map on Me" aria-label="Center Map on Me">
                    <svg width="20" height="20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                </button>
            </div>

            <!-- Floor System Vertical Switcher -->
            <div id="map-floor-switcher" class="floor-switcher-container glass-panel hidden">
                <button class="floor-btn" data-floor="3">3F</button>
                <button class="floor-btn" data-floor="2">2F</button>
                <button class="floor-btn" data-floor="1">1F</button>
                <button class="floor-btn active" data-floor="0">GF</button>
            </div>

            <!-- Information Drawer Panel (Detailed cards sliding from bottom or side) -->
            <article id="info-drawer" class="info-drawer glass-panel closed">
                <button id="close-drawer-btn" class="close-drawer-trigger" aria-label="Close Info Panel"></button>
                <div class="drawer-scroller">
                    <div id="drawer-main-content">
                        <!-- Instantiated Dynamically via ui.js -->
                    </div>
                </div>
            </article>
        </main>
    </div>

    <!-- Master Dialog Box (Modals like QR Code, Accessibility info, Share structures) -->
    <div id="modal-backdrop" class="modal-backdrop hidden">
        <div class="modal-window glass-panel">
            <header class="modal-header">
                <h3 id="modal-title">Dialog</h3>
                <button id="close-modal-btn" class="icon-button">✕</button>
            </header>
            <main class="modal-body" id="modal-content">
                <!-- Dynamically populated contents -->
            </main>
        </div>
    </div>

    <!-- Active Global Toast Dispatcher -->
    <div id="toast-wrapper" class="toast-wrapper"></div>

    <!-- Execution Sequence Initialization -->
    <script src="js/dataLoader.js"></script>
    <script src="js/map.js"></script>
    <script src="js/search.js"></script>
    <script src="js/routing.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
